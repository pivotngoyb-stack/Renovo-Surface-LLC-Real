<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard | Renovo Surface Solutions</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="../images/logo.png">
<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/admin.css">
</head>
<body class="admin-body">
  <nav class="admin-nav">
    <div class="container">
      <img src="../images/logo.png" alt="Renovo">
      <div style="display:flex; gap:24px; align-items:center;">
        <a href="/admin/dashboard.html">Dashboard</a>
        <a href="/admin/contracts.html">Contracts</a>
        <a href="/admin/estimate-new.html">+ New Estimate</a>
        <a href="/admin/invoice-new.html">+ New Invoice</a>
        <button onclick="logout()">Log Out</button>
      </div>
    </div>
  </nav>

  <div class="admin-wrap">
    <div id="summary" class="dash-header" style="display:grid; grid-template-columns:repeat(4,1fr); gap:16px; width:100%;"></div>

    <div class="dash-header">
      <h1 style="font-size:1.4rem;">Invoices</h1>
      <div style="display:flex; gap:10px;">
        <button class="btn btn-sm" style="color:var(--navy); border:1px solid #DCE4EF;" id="invoiceArchiveToggle" onclick="toggleInvoiceArchived()">Show Archived</button>
        <a href="/admin/invoice-new.html" class="btn btn-primary btn-sm">+ New Invoice</a>
      </div>
    </div>
    <div id="invoiceContent">Loading…</div>

    <div id="balancesSection" style="margin-top:40px;"></div>

    <div class="dash-header" style="margin-top:40px;">
      <h1 style="font-size:1.4rem;">Estimates &amp; Work Orders</h1>
      <div style="display:flex; gap:10px;">
        <button class="btn btn-sm" style="color:var(--navy); border:1px solid #DCE4EF;" id="estimateArchiveToggle" onclick="toggleEstimateArchived()">Show Archived</button>
        <a href="/admin/estimate-new.html" class="btn btn-primary btn-sm">+ New Estimate</a>
      </div>
    </div>
    <div id="content">Loading…</div>
  </div>

<script src="../js/admin.js"></script>
<script>
let showArchivedEstimates = false;
let showArchivedInvoices = false;

function toggleEstimateArchived() {
  showArchivedEstimates = !showArchivedEstimates;
  document.getElementById('estimateArchiveToggle').textContent = showArchivedEstimates ? 'Show Active' : 'Show Archived';
  loadEstimates();
}

function toggleInvoiceArchived() {
  showArchivedInvoices = !showArchivedInvoices;
  document.getElementById('invoiceArchiveToggle').textContent = showArchivedInvoices ? 'Show Active' : 'Show Archived';
  loadInvoices();
}

async function loadEstimates() {
  const res = await adminFetch(`/api/admin/estimates${showArchivedEstimates ? '?archived=1' : ''}`);
  const data = await res.json();
  const content = document.getElementById('content');

  if (!data.estimates.length) {
    content.innerHTML = showArchivedEstimates
      ? '<div class="empty-state">No archived estimates.</div>'
      : '<div class="empty-state">No estimates yet. <a href="/admin/estimate-new.html">Create your first one</a>.</div>';
    return;
  }

  const rows = data.estimates.map(e => `
    <tr>
      <td onclick="window.location.href='/admin/estimate-detail.html?id=${e.id}'" style="cursor:pointer;">#${e.id}</td>
      <td onclick="window.location.href='/admin/estimate-detail.html?id=${e.id}'" style="cursor:pointer;">${e.clientName || '—'}</td>
      <td onclick="window.location.href='/admin/estimate-detail.html?id=${e.id}'" style="cursor:pointer;">${statusPill(e.status)}</td>
      <td onclick="window.location.href='/admin/estimate-detail.html?id=${e.id}'" style="cursor:pointer;">${e.validUntil || '—'}</td>
      <td onclick="window.location.href='/admin/estimate-detail.html?id=${e.id}'" style="cursor:pointer;">${new Date(e.createdAt).toLocaleDateString()}</td>
      <td><button class="btn btn-sm" style="color:${e.archived ? '#1B7A3C' : '#C0392B'};" onclick="archiveEstimate(${e.id}, ${!e.archived})">${e.archived ? 'Unarchive' : 'Archive'}</button></td>
    </tr>
  `).join('');

  content.innerHTML = `
    <table class="dash-table">
      <thead><tr><th>ID</th><th>Client</th><th>Status</th><th>Valid Until</th><th>Created</th><th></th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  `;
}

async function archiveEstimate(id, archived) {
  const res = await adminFetch(`/api/admin/estimates/${id}/archive`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ archived })
  });
  if (res.ok) loadEstimates(); else alert('Failed to update estimate.');
}

async function loadInvoices() {
  const res = await adminFetch(`/api/admin/invoices${showArchivedInvoices ? '?archived=1' : ''}`);
  const data = await res.json();
  const content = document.getElementById('invoiceContent');
  const invoices = data.invoices || [];

  if (!showArchivedInvoices) {
    const totalRevenue = invoices.filter(i => i.status === 'paid').reduce((s, i) => s + i.total, 0);
    const outstanding = invoices.filter(i => i.status === 'unpaid').reduce((s, i) => s + i.total, 0);
    const unpaidCount = invoices.filter(i => i.status === 'unpaid').length;

    let forecast = 0;
    try {
      const cRes = await adminFetch('/api/admin/contracts');
      const cData = await cRes.json();
      forecast = (cData.contracts || []).filter(c => c.status === 'active').reduce((s, c) => s + Number(c.amount), 0);
    } catch (e) {}

    document.getElementById('summary').innerHTML = `
      <div class="doc-card" style="margin:0; padding:22px;">
        <div style="font-size:0.8rem; color:#8A98AC; font-weight:700; text-transform:uppercase;">Total Revenue</div>
        <div style="font-size:1.8rem; font-family:var(--font-head); font-weight:800; color:#1B7A3C;">${money(totalRevenue)}</div>
      </div>
      <div class="doc-card" style="margin:0; padding:22px;">
        <div style="font-size:0.8rem; color:#8A98AC; font-weight:700; text-transform:uppercase;">Outstanding Balance</div>
        <div style="font-size:1.8rem; font-family:var(--font-head); font-weight:800; color:#966A00;">${money(outstanding)}</div>
      </div>
      <div class="doc-card" style="margin:0; padding:22px;">
        <div style="font-size:0.8rem; color:#8A98AC; font-weight:700; text-transform:uppercase;">Unpaid Invoices</div>
        <div style="font-size:1.8rem; font-family:var(--font-head); font-weight:800; color:var(--navy);">${unpaidCount}</div>
      </div>
      <div class="doc-card" style="margin:0; padding:22px; cursor:pointer;" onclick="window.location.href='/admin/contracts.html'">
        <div style="font-size:0.8rem; color:#8A98AC; font-weight:700; text-transform:uppercase;">Forecasted Monthly Revenue</div>
        <div style="font-size:1.8rem; font-family:var(--font-head); font-weight:800; color:var(--blue);">${money(forecast)}</div>
      </div>
    `;

    // Per-client outstanding balances (active view only)
    const byClient = {};
    invoices.filter(i => i.status === 'unpaid').forEach(inv => {
      const key = inv.clientId;
      if (!byClient[key]) byClient[key] = { name: inv.clientName, total: 0 };
      byClient[key].total += inv.total;
    });
    const balances = Object.values(byClient).sort((a, b) => b.total - a.total);
    const balancesSection = document.getElementById('balancesSection');
    if (balances.length) {
      balancesSection.innerHTML = `
        <h2 style="font-size:1.2rem; margin-bottom:14px;">Outstanding by Client</h2>
        <table class="dash-table">
          <thead><tr><th>Client</th><th>Outstanding Balance</th></tr></thead>
          <tbody>${balances.map(b => `<tr><td>${b.name}</td><td>${money(b.total)}</td></tr>`).join('')}</tbody>
        </table>
      `;
    } else {
      balancesSection.innerHTML = '';
    }
  } else {
    document.getElementById('balancesSection').innerHTML = '';
  }

  if (!invoices.length) {
    content.innerHTML = showArchivedInvoices
      ? '<div class="empty-state">No archived invoices.</div>'
      : '<div class="empty-state">No invoices yet. Create one from a signed work order, or start a standalone invoice.</div>';
  } else {
    const rows = invoices.map(inv => `
      <tr>
        <td onclick="window.location.href='/admin/invoice-detail.html?id=${inv.id}'" style="cursor:pointer;">INV-${1000 + inv.id}</td>
        <td onclick="window.location.href='/admin/invoice-detail.html?id=${inv.id}'" style="cursor:pointer;">${inv.clientName || '—'}</td>
        <td onclick="window.location.href='/admin/invoice-detail.html?id=${inv.id}'" style="cursor:pointer;">${statusPill(inv.status)}</td>
        <td onclick="window.location.href='/admin/invoice-detail.html?id=${inv.id}'" style="cursor:pointer;">${money(inv.total)}</td>
        <td onclick="window.location.href='/admin/invoice-detail.html?id=${inv.id}'" style="cursor:pointer;">${new Date(inv.createdAt).toLocaleDateString()}</td>
        <td><button class="btn btn-sm" style="color:${inv.archived ? '#1B7A3C' : '#C0392B'};" onclick="archiveInvoice(${inv.id}, ${!inv.archived})">${inv.archived ? 'Unarchive' : 'Archive'}</button></td>
      </tr>
    `).join('');
    content.innerHTML = `
      <table class="dash-table">
        <thead><tr><th>Invoice</th><th>Client</th><th>Status</th><th>Total</th><th>Created</th><th></th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    `;
  }
}

async function archiveInvoice(id, archived) {
  const res = await adminFetch(`/api/admin/invoices/${id}/archive`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ archived })
  });
  if (res.ok) loadInvoices(); else alert('Failed to update invoice.');
}

loadEstimates();
loadInvoices();
</script>
</body>
</html>
