<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Work Order | Renovo Surface Solutions</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="images/logo.png">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/admin.css">
</head>
<body class="admin-body">
  <div id="content">
    <div class="state-banner"><div class="icon">⏳</div><p>Loading your work order…</p></div>
  </div>

<script>
const token = new URLSearchParams(window.location.search).get('t');
let currentTab = 'drawn';
let hasDrawn = false;
let shownServiceTypeLabel = 'General';

function showError(msg) {
  document.getElementById('content').innerHTML = `<div class="state-banner"><div class="icon">⚠️</div><p>${msg}</p></div>`;
}

const SERVICE_TERMS_CONTENT = {
  pressureWashing: `<h4>PRESSURE WASHING TERMS &amp; CONDITIONS</h4>
<p><strong>WATER USE:</strong> Renovo Surface Solutions will use water from your property's water supply. You are responsible for ensuring an accessible water spigot is available at the service location. All water usage charges are your responsibility. If no water access is available on the service date through no fault of Renovo, a $75 trip fee applies.</p>
<p><strong>PRE-EXISTING CONDITIONS:</strong> Before work begins, Renovo will photograph all surfaces. By signing this work order, you confirm you have disclosed all known pre-existing damage including cracks, chips, deteriorated grout, failing paint, and fragile surfaces. Renovo is NOT responsible for damage to surfaces that were already compromised prior to arrival. Pressure washing can reveal or worsen pre-existing deterioration.</p>
<p><strong>CHEMICAL DISCLOSURE:</strong> Commercial-grade petroleum degreasers and surface cleaners will be used. All products comply with EPA and OSHA standards. Safety Data Sheets available upon request.</p>
<p><strong>SURFACE RUNOFF:</strong> Client is responsible for ensuring adequate drainage exists near the service area. Renovo is not responsible for water intrusion into buildings, vehicles, or neighboring properties if drainage is inadequate.</p>
<p><strong>CUSTOMER RESPONSIBILITIES:</strong> Remove all vehicles, equipment, and obstacles from service areas before the technician arrives. Ensure all doors and windows near the service area are closed. Notify Renovo of any electrical boxes, outlets, or sensitive equipment nearby.</p>`,

  janitorial: `<h4>JANITORIAL SERVICES TERMS &amp; CONDITIONS</h4>
<p><strong>ACCESS &amp; KEYS:</strong> Any keys, access codes, or security badges provided to Renovo are used solely for service delivery and kept strictly confidential. Keys will be returned upon termination of this agreement. Notify Renovo immediately of any security code changes. Renovo technicians will only access areas necessary to perform the agreed services.</p>
<p><strong>CUSTOMER RESPONSIBILITIES:</strong> Ensure the property is accessible on scheduled service days. Notify Renovo at least 24 hours in advance if a scheduled service must be skipped. Secure valuables, sensitive documents, and personal items before service visits.</p>
<p><strong>SUPPLIES:</strong> Renovo provides all professional cleaning chemicals, microfiber cloths, mops, buckets, and vacuums. Client provides trash can liners, paper towels, toilet paper, and hand soap for restocking unless otherwise agreed in writing.</p>
<p><strong>CHEMICAL DISCLOSURE:</strong> Renovo uses EPA-registered cleaning and disinfection products. Safety Data Sheets are available upon request. Please disclose any chemical sensitivities before service begins.</p>
<p><strong>CONFIDENTIALITY:</strong> All business information, security codes, and sensitive data accessed during service will be kept strictly confidential.</p>
<p><strong>DAMAGE:</strong> Report any property damage within 24 hours of the service date with photos. Client should remove fragile or high-value items from service areas before cleaning visits. Renovo's liability is limited to the cost of the service in which damage occurred.</p>`,

  windowCleaning: `<h4>WINDOW CLEANING TERMS &amp; CONDITIONS</h4>
<p><strong>PRE-EXISTING CONDITIONS:</strong> Renovo is NOT responsible for: scratches, chips, or cracks existing before cleaning; hard water spots or mineral deposits that do not fully remove with standard cleaning (specialty treatment available at additional cost); failed seals on double-pane windows revealed during cleaning (foggy appearance between panes is a pre-existing condition); paint, adhesive, or stickers on glass disturbed during cleaning.</p>
<p><strong>WINDOW TINT:</strong> Renovo will not clean windows with tint that is peeling, bubbling, or improperly applied. Client must disclose any window tint issues before service.</p>
<p><strong>CUSTOMER RESPONSIBILITIES:</strong> Ensure all windows are accessible and not blocked by furniture or signage. Notify Renovo of any windows that should NOT be cleaned. Ensure staff are aware exterior window access is permitted.</p>
<p><strong>WEATHER POLICY:</strong> In heavy rain, strong wind, or freezing temperatures, Renovo reserves the right to reschedule with no cancellation fee. Client may also request weather-related rescheduling at least 3 hours before service with no penalty.</p>`,

  floorCare: `<h4>FLOOR CARE TERMS &amp; CONDITIONS — PLEASE READ CAREFULLY</h4>
<p><strong>⚠️ CRITICAL WARNING:</strong> Floor stripping involves chemical strippers and buffing machines that interact directly with your floor. OLD, DAMAGED, OR LOW-QUALITY TILES MAY LIFT, CRACK, OR SEPARATE during stripping. This is NOT damage caused by Renovo — it is a pre-existing condition revealed by the process.</p>
<p><strong>ASBESTOS:</strong> Tiles installed before 1980 may contain asbestos. By signing this work order, client certifies the tiles have been tested for asbestos OR were installed after 1980. Renovo will not strip tiles suspected of containing asbestos.</p>
<p><strong>PRE-EXISTING CONDITIONS WAIVER:</strong> Client acknowledges the following risks: (1) Old tiles may lift or crack during stripping. (2) Wetting-sensitive floors may react adversely to chemical strippers. (3) Old or failing grout may be disturbed. (4) Floors may show uneven coloration after stripping — this is the true floor color revealed under old wax, not damage. Renovo is NOT liable for these conditions.</p>
<p><strong>CHEMICAL ODOR:</strong> Floor stripping produces strong odors. The property must be ventilated during and after service. Keep staff and customers off the floor during service and for minimum 2–4 hours after final wax application.</p>
<p><strong>CUSTOMER RESPONSIBILITIES:</strong> Clear ALL furniture, equipment, and items from the floor area before service begins. Renovo does not move heavy furniture. Do NOT walk on freshly waxed floors until technician confirms the floor is safe.</p>
<p><strong>DRYING TIME:</strong> Each wax coat requires 30–60 minutes to dry. Allow minimum 2–4 hours after the final coat before opening to foot traffic.</p>
<p><strong>CANCELLATION:</strong> Less than 48 hours notice: $75 cancellation fee (chemicals and labor pre-allocated). If floor is not cleared by agreed service time: $100 per hour delay fee.</p>`,

  disinfection: `<h4>DISINFECTION &amp; SANITIZATION TERMS &amp; CONDITIONS — CHEMICAL SERVICE, READ CAREFULLY</h4>
<p><strong>CHEMICAL DISCLOSURE:</strong> Renovo uses EPA List N approved disinfectants effective against SARS-CoV-2, influenza, norovirus, and common commercial pathogens. These products are safe for hard non-porous surfaces. Safety Data Sheets available upon request.</p>
<p><strong>RE-ENTRY WAIT TIME — MANDATORY:</strong> ALL people and animals must vacate the treatment area during service AND for a minimum of 30 minutes after treatment is complete. Medical facilities: minimum 60 minutes. Client is SOLELY responsible for enforcing this wait time among all staff and occupants. Renovo is not liable for health effects caused by premature re-entry.</p>
<p><strong>CUSTOMER RESPONSIBILITIES:</strong> (1) All people and animals must vacate BEFORE Renovo begins. (2) Remove all food, beverages, and uncovered food prep surfaces from treatment area. (3) Cover or remove fish tanks and open terrariums — disinfectant mist harms aquatic life. (4) Disclose any oxygen equipment, CPAP machines, or medical devices in the treatment area. (5) Notify Renovo of any HVAC vents near sensitive equipment.</p>
<p><strong>LIABILITY:</strong> Renovo is NOT responsible for: health effects from premature re-entry; damage to electronics not disclosed and covered before treatment; damage to non-hard surfaces (fabric, paper, certain paints) not disclosed before treatment.</p>
<p><strong>MEDICAL DISCLAIMER:</strong> This service is not a substitute for medical advice or disease prevention protocols. Renovo does not guarantee the prevention of any specific illness or disease.</p>`,

  lotSweeping: `<h4>PARKING LOT SWEEPING TERMS &amp; CONDITIONS</h4>
<p><strong>CUSTOMER RESPONSIBILITIES:</strong> Ensure the parking lot is accessible at the agreed service time. Vehicles should not block primary sweep lanes. Notify Renovo at least 24 hours before service if the lot cannot be accessed. Disclose any speed bumps, bollards, drainage grates, or obstacles that could damage sweeping equipment. Ensure dumpster access is available for debris disposal.</p>
<p><strong>HAZARDOUS MATERIALS:</strong> Renovo sweeps standard debris including dirt, gravel, leaves, and litter. Hazardous materials (needles, biohazard material, large quantities of broken glass, oil spills) require separate notification and may incur additional charges. Renovo will notify client immediately upon discovering hazardous materials and will not proceed with that area without authorization.</p>
<p><strong>DAMAGE POLICY:</strong> Client must disclose all fixed obstacles before service begins. Renovo is not responsible for damage to undisclosed obstacles or pre-existing surface damage. Renovo will notify client immediately if equipment contacts any obstacle.</p>
<p><strong>INACCESSIBLE LOT:</strong> If the lot is inaccessible at the agreed service time through no fault of Renovo, a $50 trip fee applies.</p>`,

  general: `<h4>GENERAL SCOPE OF SERVICE</h4>
<p>This work order covers the services and pricing detailed in the line items of the referenced estimate. Renovo Surface Solutions LLC will perform the described work in a professional manner consistent with industry standards for commercial surface care. Client agrees to provide safe and reasonable access to the property at the scheduled service time.</p>`
};

const SERVICE_TYPE_ALIASES = {
  'parking lot sweeping': 'lotSweeping',
  'pressure washing': 'pressureWashing',
  'gas station cleaning': 'pressureWashing',
  'gas station': 'pressureWashing',
  'parking lot cleaning': 'pressureWashing',
  'building exterior': 'pressureWashing',
  'dumpster pad': 'pressureWashing',
  'sidewalk': 'pressureWashing',
  'drive-through': 'pressureWashing',
  'drive through': 'pressureWashing',
  'janitorial': 'janitorial',
  'interior cleaning': 'janitorial',
  'office cleaning': 'janitorial',
  'restroom cleaning': 'janitorial',
  'window cleaning': 'windowCleaning',
  'glass cleaning': 'windowCleaning',
  'floor care': 'floorCare',
  'strip and wax': 'floorCare',
  'floor wax': 'floorCare',
  'floor polish': 'floorCare',
  'buffing': 'floorCare',
  'disinfection': 'disinfection',
  'sanitization': 'disinfection',
  'electrostatic disinfection': 'disinfection',
  'lot sweeping': 'lotSweeping',
};

const CANONICAL_SERVICE_LABEL = {
  pressureWashing: 'Pressure Washing',
  janitorial: 'Janitorial',
  windowCleaning: 'Window Cleaning',
  floorCare: 'Floor Care',
  disinfection: 'Disinfection',
  lotSweeping: 'Lot Sweeping',
};

function getServiceTerms(serviceType) {
  const text = (serviceType || '').trim().toLowerCase();
  const matchedAlias = Object.keys(SERVICE_TYPE_ALIASES).find((alias) => text.includes(alias));
  const key = matchedAlias ? SERVICE_TYPE_ALIASES[matchedAlias] : undefined;
  return SERVICE_TERMS_CONTENT[key] || SERVICE_TERMS_CONTENT.general;
}

const STANDARD_TERMS_HTML = `
<h4>Payment Terms</h4>
<p>Payment is due upon completion of service. For recurring contracts, invoices are issued on the 1st of each month and due within 15 days. Late payments are subject to a 1.5% monthly interest charge. Accepted: Cash, Check, Zelle (801-369-2330), Credit Card (3% processing fee). Returned checks: $35 fee.</p>
<h4>Cancellation</h4>
<p>Cancellations more than 48 hours before service: no charge. Within 24–48 hours: $50 fee. Within 24 hours or same-day: $75 fee. No-show (technician arrives, no access): $75 trip fee. Recurring contracts: 30 days written notice to cancel.</p>
<h4>Satisfaction Guarantee</h4>
<p>If unsatisfied with service quality, contact Renovo within 24 hours. We will return and re-clean at no charge. This guarantee does not apply to pre-existing conditions.</p>
<h4>Photo Consent</h4>
<p>Client consents to before/after photos for documentation. Renovo may use these photos for marketing unless client opts out by writing "NO PHOTOS" in the message field on the work order.</p>
<h4>Liability</h4>
<p>Renovo Surface Solutions LLC maintains general liability insurance. Maximum liability for any claim shall not exceed the total amount paid for the service in question. Damage claims must be reported within 24 hours of service completion with photographic evidence.</p>
<h4>Governing Law</h4>
<p>This agreement is governed by the laws of the State of Utah.</p>
`;

const SERVICE_KEYWORDS = {
  pressureWashing: ['pressure wash', 'power wash', 'dumpster pad', 'dumpster', 'gutter', 'facade', 'graffiti', 'concrete seal', 'concrete clean', 'concrete restoration', 'sidewalk', 'exterior wash', 'building wash', 'building exterior', 'parking garage', 'parking lot clean', 'gas station', 'drive-through', 'drive through'],
  windowCleaning: ['window', 'glass'],
  floorCare: ['floor strip', 'floor wax', 'strip and wax', 'strip & wax', 'floor care', 'floor restoration', 'floor polish', 'buffing', 'buff', 'vct', 'tile floor'],
  disinfection: ['disinfect', 'electrostatic', 'fogging', 'pathogen', 'virus', 'bacteria', 'sanitization'],
  lotSweeping: ['lot sweep', 'sweeping', 'parking sweep', 'debris removal'],
  janitorial: ['janitorial', 'lobby cleaning', 'office cleaning', 'interior cleaning', 'common area cleaning', 'break room', 'kitchen cleaning', 'restroom', 'sanitation'],
};

function detectServiceCategories(lineItems) {
  const text = (lineItems || []).map((li) => (li.description || '').toLowerCase()).join(' | ');
  const matched = Object.keys(SERVICE_KEYWORDS).filter((key) => SERVICE_KEYWORDS[key].some((kw) => text.includes(kw)));
  return matched.length ? matched : ['general'];
}

function renderServiceTermsHtml(lineItems) {
  const categories = detectServiceCategories(lineItems);
  shownServiceTypeLabel = categories[0] === 'general' ? 'General' : categories.map((key) => CANONICAL_SERVICE_LABEL[key]).join(', ');
  if (categories[0] === 'general') return SERVICE_TERMS_CONTENT.general;
  return categories.map((key) => getServiceTerms(CANONICAL_SERVICE_LABEL[key])).join('');
}

function toggleSigningEnabled() {
  const checked = document.getElementById('termsCheck').checked;
  document.getElementById('signingBlock').classList.toggle('field-disabled', !checked);
  document.getElementById('signBtn').disabled = !checked;
  document.getElementById('signerName').disabled = !checked;
  document.getElementById('tabDrawn').disabled = !checked;
  document.getElementById('tabTyped').disabled = !checked;
  const typedEl = document.getElementById('typedSignature');
  if (typedEl) typedEl.disabled = !checked;
}

async function load() {
  if (!token) { showError('Missing work order link.'); return; }
  const res = await fetch(`/api/work-order/${token}`);
  if (!res.ok) { showError('This work order could not be found.'); return; }
  const { workOrder, client, signature, lineItems } = await res.json();
  render(workOrder, client, signature, lineItems);
}

function render(workOrder, client, signature, lineItems) {
  if (workOrder.status === 'signed' && signature) {
    document.getElementById('content').innerHTML = `
      <div class="doc-card">
        <div class="doc-header">
          <img src="images/logo.png" alt="Renovo Surface Solutions">
          <h1 style="font-size:1.3rem;">Work Order #${workOrder.id}</h1>
        </div>
        <div class="state-banner">
          <div class="icon">✅</div>
          <p><strong>Signed by ${signature.signerName}</strong></p>
          <p style="color:#8A98AC; font-size:0.85rem;">${new Date(signature.signedAt).toLocaleString()}</p>
        </div>
        ${signature.termsAgreed ? `<p style="text-align:center; font-size:0.85rem; color:#4A5A72; margin-top:-10px; margin-bottom:20px;">Client agreed to <strong>${signature.serviceTypeShown || 'General'}</strong> Terms &amp; Conditions on ${new Date(signature.signedAt).toLocaleDateString()} at ${new Date(signature.signedAt).toLocaleTimeString()}</p>` : ''}
        <div class="doc-terms">${workOrder.termsText}</div>
      </div>
    `;
    return;
  }

  document.getElementById('content').innerHTML = `
    <div class="doc-card">
      <div class="doc-header">
        <img src="images/logo.png" alt="Renovo Surface Solutions">
        <div style="text-align:right;">
          <h1 style="font-size:1.3rem;">Work Order #${workOrder.id}</h1>
          <p style="color:#8A98AC; font-size:0.85rem;">${client?.name || ''}</p>
        </div>
      </div>
      <div class="doc-terms">${workOrder.termsText}</div>

      <label style="display:block; font-size:0.82rem; font-weight:600; margin-bottom:8px; color:var(--navy);">Terms &amp; Conditions</label>
      <div class="service-terms-scroll" id="serviceTermsBox">${renderServiceTermsHtml(lineItems)}</div>

      <div class="consent-row">
        <input type="checkbox" id="termsCheck" required onchange="toggleSigningEnabled()">
        <label for="termsCheck">I have read and agree to all terms and conditions above</label>
      </div>

      <div class="standard-terms-block">${STANDARD_TERMS_HTML}</div>

      <div id="signingBlock" class="field-disabled">
        <div class="field-group">
          <label for="signerName">Your Full Name</label>
          <input type="text" id="signerName" placeholder="Type your full legal name" disabled>
        </div>

        <label style="display:block; font-size:0.82rem; font-weight:600; margin-bottom:8px; color:var(--navy);">Signature</label>
        <div class="sig-tabs">
          <button type="button" class="sig-tab-btn active" id="tabDrawn" onclick="switchTab('drawn')" disabled>Draw Signature</button>
          <button type="button" class="sig-tab-btn" id="tabTyped" onclick="switchTab('typed')" disabled>Type Signature</button>
        </div>

        <div class="sig-panel active" id="panelDrawn">
          <div class="sig-pad-wrap"><canvas id="sigCanvas"></canvas></div>
          <button type="button" class="btn btn-sm" style="margin-top:8px; color:var(--blue);" onclick="clearCanvas()">Clear</button>
        </div>
        <div class="sig-panel" id="panelTyped">
          <input type="text" id="typedSignature" placeholder="Type your name as your signature" style="font-family: 'Brush Script MT', cursive; font-size:1.6rem; width:100%; padding:14px; border:1.5px solid #DCE4EF; border-radius:8px;" disabled>
        </div>

        <div class="consent-row">
          <input type="checkbox" id="consentCheck">
          <label for="consentCheck">I consent to sign this document electronically and agree that my electronic signature is legally binding, the same as a handwritten signature. I understand I may request a paper copy at any time by contacting Renovo Surface Solutions.</label>
        </div>

        <div class="doc-actions">
          <button class="btn btn-primary" id="signBtn" onclick="submitSignature()" disabled>Sign Work Order</button>
        </div>
        <p id="signError" class="error-text" style="text-align:center;"></p>
      </div>
    </div>
  `;

  initCanvas();
}

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tabDrawn').classList.toggle('active', tab === 'drawn');
  document.getElementById('tabTyped').classList.toggle('active', tab === 'typed');
  document.getElementById('panelDrawn').classList.toggle('active', tab === 'drawn');
  document.getElementById('panelTyped').classList.toggle('active', tab === 'typed');
}

let canvas, ctx, drawing = false;

function initCanvas() {
  canvas = document.getElementById('sigCanvas');
  const rect = canvas.getBoundingClientRect();
  const ratio = window.devicePixelRatio || 1;
  canvas.width = rect.width * ratio;
  canvas.height = rect.height * ratio;
  ctx = canvas.getContext('2d');
  ctx.scale(ratio, ratio);
  ctx.strokeStyle = '#0D1F38';
  ctx.lineWidth = 2.2;
  ctx.lineCap = 'round';

  const pos = (e) => {
    const r = canvas.getBoundingClientRect();
    const point = e.touches ? e.touches[0] : e;
    return { x: point.clientX - r.left, y: point.clientY - r.top };
  };

  const start = (e) => { e.preventDefault(); drawing = true; hasDrawn = true; const p = pos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); };
  const move = (e) => { if (!drawing) return; e.preventDefault(); const p = pos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); };
  const end = () => { drawing = false; };

  canvas.addEventListener('mousedown', start);
  canvas.addEventListener('mousemove', move);
  window.addEventListener('mouseup', end);
  canvas.addEventListener('touchstart', start, { passive: false });
  canvas.addEventListener('touchmove', move, { passive: false });
  canvas.addEventListener('touchend', end);
}

function clearCanvas() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  hasDrawn = false;
}

async function submitSignature() {
  const errEl = document.getElementById('signError');
  errEl.classList.remove('show');

  const signerName = document.getElementById('signerName').value.trim();
  const consentConfirmed = document.getElementById('consentCheck').checked;
  const termsAgreed = document.getElementById('termsCheck').checked;

  if (!termsAgreed) return fail('Please confirm you have read and agree to the terms and conditions.');
  if (!signerName) return fail('Please enter your full name.');
  if (!consentConfirmed) return fail('Please confirm you consent to sign electronically.');

  let signatureData, signatureType;
  if (currentTab === 'drawn') {
    if (!hasDrawn) return fail('Please draw your signature, or switch to "Type Signature".');
    signatureData = canvas.toDataURL('image/png');
    signatureType = 'drawn';
  } else {
    const typed = document.getElementById('typedSignature').value.trim();
    if (!typed) return fail('Please type your signature.');
    signatureData = typed;
    signatureType = 'typed';
  }

  const btn = document.getElementById('signBtn');
  btn.disabled = true;
  btn.textContent = 'Signing…';

  try {
    const res = await fetch(`/api/work-order/${token}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ signerName, signatureType, signatureData, consentConfirmed, termsAgreed, serviceType: shownServiceTypeLabel })
    });
    if (!res.ok) {
      const data = await res.json();
      throw new Error(data.error || 'Failed to sign');
    }
    load();
  } catch (err) {
    fail(err.message);
    btn.disabled = false;
    btn.textContent = 'Sign Work Order';
  }
}

function fail(msg) {
  const errEl = document.getElementById('signError');
  errEl.textContent = msg;
  errEl.classList.add('show');
}

load();
</script>
</body>
</html>
